<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yadin's official Website</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="wrapper">
      <!-- Top header section -->
      <div class="top-header">
        <div class="container">
          <div class="name-title">
            <strong>Yadin </strong>
            <hr class="verticle-line" />
            Full Stack Developer
          </div>
          <div class="menu">
            <ul>
              <li>Home</li>
              <li>Skills</li>
              <li>Projects</li>
              <li>About</li>
              <li>Contact</li>
            </ul>
          </div>
        </div>
      </div>
      <header class="hero">
        <div class="ch-background">
          <i class="fa-solid fa-circle-half-stroke"></i>
        </div>
        <div class="container">
          <div class="hero-detail">
            <div>
              <h4>Hi, I'm Yadin Nou</h4>
              <h1>Full Stack Developer</h1>
              <p>I love coding so much</p>
              <div class="download">
                <a href="#"
                  >Download CV <i class="fa-solid fa-download"></i>
                </a>
              </div>
            </div>
          </div>
          <div class="my-pic">
            <img
              class="img-yadin"
              src="./assists/yadin.jpg"
              width="100%"
              alt="yadin nou"
            />
          </div>
        </div>
      </header>
      <section class="link-show">
        <div class="container">
          <div class="link-it">
            <div class="award"><i class="fa-solid fa-award"></i></div>
            <div class="award-subject">IT</div>
            <div class="award-status">Graduataion</div>
          </div>
          <span class="v-line"></span>
          <div class="link-project">
            <div class="award"><i class="fa-solid fa-award"></i></div>
            <div class="award-subject">5+ Projects</div>
            <div class="award-status">Completed</div>
          </div>
          <span class="v-line"></span>
          <div class="it">
            <div class="award"><i class="fa-solid fa-award"></i></div>
            <div class="award-subject">1+ year</div>
            <div class="award-status">Experience</div>
          </div>
        </div>
      </section>
    </div>
    <!--End wrapper-->
  </body>
</html>
