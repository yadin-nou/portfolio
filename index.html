<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yadin's official Website</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="wrapper">
      <!-- Top header section -->
      <div class="top-header background">
        <div class="container">
          <div class="name-title">
            <strong>Yadin </strong>
            <hr class="verticle-line" />
            Full Stack Developer
          </div>
          <div class="menu">
            <ul>
              <li>Home</li>
              <li>Skills</li>
              <li>Projects</li>
              <li>About</li>
              <li>Contact</li>
            </ul>
          </div>
        </div>
      </div>
      <header class="hero background">
        <div class="ch-background">
          <i class="fa-solid fa-circle-half-stroke"></i>
        </div>
        <div class="container">
          <div class="hero-detail">
            <div>
              <h4>Hi, I'm Yadin Nou</h4>
              <h1>Full Stack Developer</h1>
              <p>I love coding so much</p>
              <div class="download">
                <a href="#"
                  >Download CV <i class="fa-solid fa-download"></i>
                </a>
              </div>
            </div>
          </div>
          <div class="my-pic">
            <img
              class="img-yadin"
              src="./assists/yadin.jpg"
              width="100%"
              alt="yadin nou"
            />
          </div>
        </div>
      </header>
      <section class="link-show background">
        <div class="container">
          <div class="link-it">
            <div class="award"><i class="fa-solid fa-award"></i></div>
            <div class="award-subject">IT</div>
            <div class="award-status">Graduataion</div>
          </div>
          <span class="v-line"></span>
          <div class="link-project">
            <div class="award"><i class="fa-solid fa-award"></i></div>
            <div class="award-subject">5+ Projects</div>
            <div class="award-status">Completed</div>
          </div>
          <span class="v-line"></span>
          <div class="it">
            <div class="award"><i class="fa-solid fa-award"></i></div>
            <div class="award-subject">1+ year</div>
            <div class="award-status">Experience</div>
          </div>
        </div>
        <div class="clickTop">^</div>
      </section>

      <section class="skills background">
        <div class="container">
          <div class="title">Skills</div>
          <div class="sub-skills">
            <div class="html subskill-flex">
              <span
                ><i
                  class="fa-brands fa-html5"
                  style="color: rgb(255, 146, 59)"
                ></i></span
              >HMTL
            </div>
            <div class="css subskill-flex">
              <span
                ><i
                  class="fa-brands fa-css3"
                  style="color: rgb(118, 116, 252)"
                ></i></span
              >&nbsp;&nbsp;&nbsp;CSS
            </div>
            <div class="javascript subskill-flex">
              <span
                ><i
                  class="fa-brands fa-js"
                  style="color: rgb(30, 48, 80)"
                ></i></span
              >Javscript
            </div>
            <div class="git subskill-flex">
              <span
                ><i
                  class="fa-brands fa-github"
                  style="color: rgb(30, 48, 80)"
                ></i></span
              >Github
            </div>
            <div class="php subskill-flex">
              <span
                ><i
                  class="fa-brands fa-php"
                  style="color: rgb(106, 99, 230)"
                ></i></span
              >&nbsp;&nbsp;&nbsp;PHP
            </div>
            <div class="mysql subskill-flex">
              <span
                ><i
                  class="fa-solid fa-database"
                  style="color: rgb(99, 230, 190)"
                ></i></span
              >MySQL
            </div>
            <div class="sub-skills">
            <div class="React subskill-flex">
              <span
                ><i class="fa-brands fa-react" style="color: rgb(36, 85, 159);"></i></span
              >RECT JS
            </div>
            <div class="subskill-flex">
              <span
                ><i class="fa-brands fa-wordpress" style="color: rgb(36, 85, 159);"></i></span
              >WordPress
            </div>
            
             
            
            
          </div>
        </div>
      </section>
      <section class="projects background">
        
      </section>
    </div>
    <!--End wrapper-->
  </body>
</html>
